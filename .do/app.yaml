name: elmridgedental
region: nyc

services:
  - name: web
    github:
      repo: jeffmuszynski/elmridgedental
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    source_dir: /
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: web
    - match:
        path:
          prefix: /dentistnearme
      redirect:
        uri: /
        authority: www.elmridgedental.com
        scheme: https
        redirect_code: 301
    - match:
        path:
          prefix: /blog-dental-implant-cost-killeen-tx
      redirect:
        uri: /blog/dental-implant-cost-killeen-tx
        authority: www.elmridgedental.com
        scheme: https
        redirect_code: 301
